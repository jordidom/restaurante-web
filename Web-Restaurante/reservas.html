    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Restaurante Sabor</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>

            <li class="nav-item">
              <a class="nav-link" href="menu.html">Carta</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="reservas.html">Reservas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contacto.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="section-padding">
      <div class="container">
        <div class="section-title reveal">
          <h2>Reserva tu mesa</h2>
          <p>Un formulario limpio y profesional que da confianza al cliente.</p>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-8 reveal-zoom">
            <div class="form-section">
              <form id="formReserva">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Hora</label>
                    <input type="time" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Personas</label>
                    <input
                      type="number"
                      min="1"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Observaciones</label>
                    <textarea
                      class="form-control"
                      rows="4"
                      placeholder="Alergias, celebración, preferencia de mesa..."
                    ></textarea>
                  </div>
                  <div class="col-12 text-center mt-3">
                    <button class="btn btn-custom">Confirmar reserva</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

      href="https://wa.me/34600123456"
